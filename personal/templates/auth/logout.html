<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2334495e'/%3E%3Ccircle cx='40' cy='40' r='20' fill='none' stroke='%23f1c40f' stroke-width='6'/%3E%3Cline x1='55' y1='55' x2='75' y2='75' stroke='%23f1c40f' stroke-width='6' stroke-linecap='round'/%3E%3Crect x='28' y='28' width='24' height='6' fill='%23f1c40f' rx='2'/%3E%3Cpath d='M28 34 L40 28 L52 34' fill='none' stroke='%23f1c40f' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='40' cy='42' r='3' fill='%23f1c40f'/%3E%3C/svg%3E">
    <title>Cerrar Sesión - Gestión Académica</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .logout-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            margin-bottom: 30px;
        }
        button {
            padding: 12px 30px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
        }
        button:hover {
            background: #c0392b;
        }
        .cancel-link {
            padding: 12px 30px;
            background: #95a5a6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
        }
        .cancel-link:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <h2>🚪 Cerrar Sesión</h2>
        <p>¿Estás seguro de que deseas cerrar tu sesión?</p>
        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit">Sí, cerrar sesión</button>
        </form>
        <a href="{% url 'search' %}" class="cancel-link">Cancelar</a>
    </div>
</body>
</html>
